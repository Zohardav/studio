
# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Optimized for Next.js 15 builds and SSR concurrency
  concurrency: 80
  memory: 1024Mi
  maxInstances: 10
  minInstances: 0

env:
  - variable: NODE_ENV
    value: production
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
